<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standard Project Orchestrator v5.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141416;
    --surface2: #1c1c1f;
    --surface3: #242428;
    --border: #2e2e33;
    --accent: #7c6af7;
    --accent2: #a89ef8;
    --text: #e8e8ec;
    --text2: #9292a0;
    --green: #3ecf8e;
    --amber: #f5a623;
    --red: #ff4b4b;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .header { height: 64px; background: rgba(13,13,15,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; position: sticky; top: 0; z-index: 200; }
  .logo { font-family: var(--mono); font-weight: 600; color: var(--accent2); display: flex; align-items: center; gap: 10px; }
  .logo .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; }

  .tabs { display: flex; gap: 2rem; }
  .tab-btn { background: none; border: none; color: var(--text2); font-weight: 600; font-size: 14px; cursor: pointer; padding: 1.5rem 0; border-bottom: 2px solid transparent; transition: 0.2s; }
  .tab-btn.active { color: var(--accent2); border-color: var(--accent); }

  .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

  /* BOARD */
  .roadmap-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; }
  .column { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); }
  .column-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .task-list { padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
  .task-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
  .task-title { font-weight: 600; font-size: 14px; margin-bottom: 0.4rem; display: block; }
  .task-desc { font-size: 12px; color: var(--text2); line-height: 1.4; }
  .category-tag { font-size: 9px; font-family: var(--mono); background: var(--surface3); padding: 2px 6px; border-radius: 4px; color: var(--accent2); text-transform: uppercase; margin-bottom: 8px; display: inline-block; }

  /* FORM (BLUEPRINT) */
  .blueprint-container { display: grid; grid-template-columns: 240px 1fr; gap: 3rem; }
  .blueprint-nav { display: flex; flex-direction: column; gap: 0.5rem; }
  .bp-nav-item { padding: 10px 1rem; border-radius: 8px; font-size: 13px; color: var(--text2); cursor: pointer; }
  .bp-nav-item.active { background: var(--surface3); color: var(--accent2); font-weight: 600; }
  .form-section { display: none; }
  .form-section.active { display: block; animation: fadeIn 0.3s ease; }

  .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
  .field label { font-size: 12px; font-weight: 600; color: var(--text2); display: flex; align-items: center; gap: 8px; }
  input, select, textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-size: 14px; outline: none; }

  /* SYNC */
  .sync-box { background: #000; padding: 2rem; border-radius: 12px; border: 1px solid var(--border); position: relative; }
  pre { font-family: var(--mono); font-size: 13px; color: var(--green); white-space: pre-wrap; }

  /* UTILS */
  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .btn { padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-size: 14px; transition: 0.2s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-generate { background: var(--green); color: #0d0d0f; }
</style>
</head>
<body>

<header class="header">
  <div class="logo"><div class="dot"></div> ORCHESTRATOR_UNIVERSAL</div>
  <div class="tabs">
    <button class="tab-btn active" id="tab-roadmap" onclick="switchMainTab('roadmap')">Cronograma</button>
    <button class="tab-btn" id="tab-blueprint" onclick="switchMainTab('blueprint')">Planejamento</button>
    <button class="tab-btn" id="tab-sync" onclick="switchMainTab('sync')">Sincronização</button>
  </div>
  <div id="project-label" style="font-size: 11px; font-family: var(--mono); color: var(--text2);">NOVO_PROJETO</div>
</header>

<div class="container">

  <!-- CRONOGRAMA -->
  <div id="page-roadmap" class="page active">
    <div class="roadmap-grid">
      <div class="column"><div class="column-header">Pendente</div><div class="task-list" id="list-todo"></div></div>
      <div class="column"><div class="column-header">Em Andamento</div><div class="task-list" id="list-doing"></div></div>
      <div class="column"><div class="column-header">Concluído</div><div class="task-list" id="list-done"></div></div>
    </div>
  </div>

  <!-- PLANEJAMENTO (PADRÃO INFRAESTRUTURA ADICIONADO) -->
  <div id="page-blueprint" class="page">
    <div class="blueprint-container">
      <nav class="blueprint-nav">
        <div class="bp-nav-item active" onclick="switchBP(0)">🎯 Fundamentos</div>
        <div class="bp-nav-item" onclick="switchBP(1)">🏗️ Infra & Deploy</div>
        <div class="bp-nav-item" onclick="switchBP(2)">⚙️ Stack Técnica</div>
        <div class="bp-nav-item" onclick="switchBP(3)">🔄 Fluxos & Telas</div>
        <div class="bp-nav-item" onclick="switchBP(4)">🚀 Escopo MVP</div>
        <button class="btn btn-generate" style="margin-top: 2rem" onclick="generateBlueprint()">Gerar Blueprint</button>
      </nav>

      <div class="blueprint-content">
        <!-- FASE 0 -->
        <div class="form-section active" id="bp-0">
          <h2>Fundamentos</h2>
          <div class="field"><label>Nome do Sistema</label><input type="text" id="f-nome" placeholder="Ex: Gestão de Projetos"></div>
          <div class="field"><label>Problema Central</label><textarea id="f-problema"></textarea></div>
        </div>

        <!-- FASE 1: INFRAESTRUTURA (NOVO PADRÃO) -->
        <div class="form-section" id="bp-1">
          <h2>Infraestrutura & Deploy</h2>
          <div class="field">
            <label>GitHub Repository URL</label>
            <input type="text" id="infra-git" placeholder="https://github.com/usuario/projeto">
          </div>
          <div class="field">
            <label>Supabase Project Config</label>
            <textarea id="infra-supabase" placeholder="Cole aqui a URL e Anon Key"></textarea>
          </div>
          <div class="field">
            <label>Vercel URL</label>
            <input type="text" id="infra-vercel" placeholder="https://projeto.vercel.app">
          </div>
        </div>

        <!-- OUTRAS FASES -->
        <div class="form-section" id="bp-2">
          <h2>Stack Técnica</h2>
          <div class="field"><label>Frontend</label><select id="t-front"><option>Next.js (App Router)</option></select></div>
          <div class="field"><label>Backend</label><select id="t-back"><option>NestJS</option><option>Supabase Edge Functions</option></select></div>
        </div>
      </div>
    </div>
  </div>

  <!-- SYNC -->
  <div id="page-sync" class="page">
    <div class="sync-box">
      <h2>Comando para CLI</h2>
      <pre id="sync-code"></pre>
      <button class="btn btn-primary" onclick="copySync()">Copiar</button>
    </div>
  </div>

</div>

<script>
  let projectState = { roadmap: [] };

  function switchMainTab(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    document.getElementById('tab-' + id).classList.add('active');
  }

  function switchBP(n) {
    document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.bp-nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById('bp-' + n).classList.add('active');
    document.querySelectorAll('.bp-nav-item')[n].classList.add('active');
  }

  function renderRoadmap() {
    // Simulação de tarefas iniciais padrão de infraestrutura
    const defaultTasks = [
      { category: "Infra", title: "Setup GitHub", status: "todo", description: "Configurar repositório remoto." },
      { category: "Infra", title: "Setup Supabase", status: "todo", description: "Criar tabelas e chaves de API." },
      { category: "Engenharia", title: "Setup Vercel", status: "todo", description: "Conectar GitHub ao Vercel." }
    ];
    
    const lists = { todo: document.getElementById('list-todo'), doing: document.getElementById('list-doing'), done: document.getElementById('list-done') };
    defaultTasks.forEach(t => {
      const card = `<div class="task-card"><span class="category-tag">${t.category}</span><span class="task-title">${t.title}</span><p class="task-desc">${t.description}</p></div>`;
      lists[t.status].innerHTML += card;
    });
  }

  function copySync() {
    const code = `# INICIALIZAÇÃO DE INFRA\n- Projeto: ${document.getElementById('f-nome').value}\n- Ação: Criar Repositórios e Banco\n- Comando: "Engenheiro, execute o setup de GitHub e Supabase conforme o padrão definido."`;
    navigator.clipboard.writeText(code);
    alert('Comando copiado!');
  }

  renderRoadmap();
</script>
</body>
</html>
